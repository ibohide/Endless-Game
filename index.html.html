<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endless Runner Game</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

canvas{
background:linear-gradient(#87CEEB,#E0F6FF);
display:block;
margin:auto;
}

#ui{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:24px;
}

#devname{
position:absolute;
top:10px;
right:20px;
font-size:20px;
color:black;
font-weight:bold;
}

#gameover{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:20px;
border-radius:10px;
}

#startMenu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:30px;
border-radius:10px;
}

#pauseBtn{
position:absolute;
bottom:20px;
left:20px;
font-size:18px;
padding:10px 20px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span> |
Coins: <span id="coin">0</span> |
High Score: <span id="highscore">0</span>
</div>

<div id="devname">This Game Developed By Rahul Ranchal</div>

<div id="startMenu">
<h1>Runner Game</h1>
<button onclick="startGame()">Start Game</button>
</div>

<div id="gameover">
<h1>Game Over</h1>
<button onclick="restartGame()">Restart</button>
</div>

<button id="pauseBtn" onclick="pauseGame()">Pause</button>

<canvas id="gameCanvas"></canvas>

<script>

const canvas = document.getElementById("gameCanvas")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let highScore = localStorage.getItem("runnerHighScore") || 0
document.getElementById("highscore").innerText = highScore

let player={
x:200,
y:canvas.height-155,
width:50,
height:50,
vy:0,
jumpCount:0,
legAnim:0
}

let gravity=0.9
let obstacles=[]
let birds=[]
let coins=[]
let clouds=[]

let speed=4
let maxSpeed=10
let score=0
let coinScore=0
let gameOver=false
let paused=true

let jumpSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg")
let coinSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg")

function createCloud(){
clouds.push({
x:canvas.width,
y:50 + Math.random()*150
})
}
setInterval(createCloud,4000)

function createCoin(){
coins.push({
x:canvas.width,
y:canvas.height-180-Math.random()*120,
size:15
})
}
setInterval(createCoin,2000)

function createObstacle(){

let height=50+Math.random()*80

obstacles.push({
x:canvas.width,
y:canvas.height-height-100,
width:50,
height:height
})

}
setInterval(createObstacle,1500)

function createBird(){
birds.push({
x:canvas.width,
y:50 + Math.random()*150,
size:20
})
}
setInterval(createBird,3000)

function update(){

if(gameOver || paused) return

player.vy+=gravity
player.y+=player.vy

if(player.y>canvas.height-150){
player.y=canvas.height-150
player.jumpCount=0
}

if(speed < maxSpeed){
speed += 0.002
}

obstacles.forEach(o=>{

o.x-=speed

if(
player.x < o.x + o.width &&
player.x + player.width > o.x &&
player.y < o.y + o.height &&
player.y + player.height > o.y
){

gameOver=true
document.getElementById("gameover").style.display="block"

if(score > highScore){
localStorage.setItem("runnerHighScore",score)
}

}

})

birds.forEach(b=>{
b.x -= speed*0.5
})

clouds.forEach(c=>{
c.x -= speed*0.3
})

coins.forEach((c,i)=>{

c.x -= speed

if(
player.x < c.x + c.size &&
player.x + player.width > c.x &&
player.y < c.y + c.size &&
player.y + player.height > c.y
){

score += 50
coinScore++
coinSound.play()

document.getElementById("coin").innerText=coinScore

coins.splice(i,1)

}

})

score++
document.getElementById("score").innerText=score

player.legAnim += 0.2

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

clouds.forEach(c=>{
ctx.beginPath()
ctx.arc(c.x,c.y,20,0,Math.PI*2)
ctx.arc(c.x+20,c.y+10,20,0,Math.PI*2)
ctx.arc(c.x-20,c.y+10,20,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="green"
ctx.fillRect(0,canvas.height-100,canvas.width,100)

ctx.fillStyle="#FFD39B"
ctx.beginPath()
ctx.arc(player.x + 25, player.y + 10, 10, 0, Math.PI * 2)
ctx.fill()

ctx.strokeStyle="blue"
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(player.x + 25, player.y + 20)
ctx.lineTo(player.x + 25, player.y + 40)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(player.x + 10, player.y + 30)
ctx.lineTo(player.x + 40, player.y + 30)
ctx.stroke()

let legOffset = Math.sin(player.legAnim)*10

ctx.beginPath()
ctx.moveTo(player.x + 25, player.y + 40)
ctx.lineTo(player.x + 10 + legOffset, player.y + 55)

ctx.moveTo(player.x + 25, player.y + 40)
ctx.lineTo(player.x + 40 - legOffset, player.y + 55)
ctx.stroke()

ctx.fillStyle="gold"

coins.forEach(c=>{
ctx.beginPath()
ctx.arc(c.x,c.y,c.size,0,Math.PI*2)
ctx.fill()
})

ctx.strokeStyle="black"

birds.forEach(b=>{
ctx.beginPath()
ctx.moveTo(b.x,b.y)
ctx.lineTo(b.x+10,b.y-5)
ctx.lineTo(b.x+20,b.y)
ctx.stroke()
})

ctx.fillStyle="black"

obstacles.forEach(o=>{
ctx.fillRect(o.x,o.y,o.width,o.height)
})

}

function gameLoop(){
update()
draw()
requestAnimationFrame(gameLoop)
}

gameLoop()

function jump(){
if(player.jumpCount < 2){
player.vy=-15
player.jumpCount++
jumpSound.play()
}
}

function startGame(){
paused=false
document.getElementById("startMenu").style.display="none"
}

function pauseGame(){
paused=!paused
}

document.addEventListener("keydown",e=>{

if(e.code==="Space"){

if(gameOver){
restartGame()
return
}

if(paused){
startGame()
}

jump()

}

})

canvas.addEventListener("click",jump)
canvas.addEventListener("touchstart",jump)

function restartGame(){
location.reload()
}

</script>

</body>
</html>
